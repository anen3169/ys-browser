<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YS Browser</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 16px;
    min-height: 100vh;
}
.container { max-width: 600px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
.logo { font-size: 40px; font-weight: 700; color: #8b5cf6; margin-bottom: 5px; }
.subtitle { color: #666; font-size: 13px; }

.search-box {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
}
.search-input {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 14px;
    padding: 16px 18px;
    color: #fff;
    font-size: 16px;
    outline: none;
}
.search-input:focus { border-color: #8b5cf6; }
.search-btn {
    background: #8b5cf6;
    border: none;
    border-radius: 14px;
    padding: 16px 24px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    font-size: 16px;
    min-width: 80px;
}
.search-btn:active { background: #7c3aed; transform: scale(0.98); }

.info-text {
    color: #666;
    font-size: 12px;
    margin-bottom: 25px;
    text-align: center;
}

.result-box {
    background: #1a1a1a;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 15px;
    border-left: 3px solid #8b5cf6;
}
.result-tag {
    color: #8b5cf6;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 6px;
}
.result-content { font-size: 20px; font-weight: 600; }

.search-result {
    margin-bottom: 15px;
    padding: 14px;
    background: #111;
    border-radius: 12px;
    border-left: 3px solid #8b5cf6;
}
.result-url { color: #4ade80; font-size: 12px; margin-bottom: 4px; word-break: break-all; }
.result-title { color: #8b5cf6; font-size: 17px; margin-bottom: 5px; text-decoration: none; display: block; font-weight: 500; }
.result-desc { color: #999; font-size: 13px; line-height: 1.5; }

.crawler-box {
    background: #111;
    border: 1px solid #333;
    border-radius: 14px;
    padding: 18px;
    margin-top: 30px;
}
.crawler-title { font-size: 15px; margin-bottom: 12px; font-weight: 600; }
.crawler-input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 14px;
    color: #fff;
    margin-bottom: 10px;
    font-size: 16px;
}
.crawler-btn {
    width: 100%;
    background: white;
    color: black;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-weight: 600;
    cursor: pointer;
    font-size: 16px;
}

.error { color: #ef4444; padding: 14px; background: #1a0a0a; border-radius: 12px; margin-bottom: 15px; font-size: 14px; }

/* Mobil için dokunma alanı büyük */
@media (max-width: 480px) {
    body { padding: 12px; }
    .logo { font-size: 36px; }
    .search-input { font-size: 16px; } /* iOS zoom engellemek için 16px şart */
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">YS Browser</div>
        <div class="subtitle">Mobil Web Tarayıcı</div>
    </div>

    <form method="GET" action="/">
        <div class="search-box">
            <input type="text" name="q" class="search-input" placeholder="Ara veya URL gir" value="{{ query }}" autocomplete="off">
            <button type="submit" class="search-btn">Ara</button>
        </div>
    </form>

    <div class="info-text">Örnek: python nedir / 25*4 / https://webtekno.com</div>

    {% if is_math %}
    <div class="result-box">
        <div class="result-tag">YS AKILLI YANIT</div>
        <div class="result-content">{{ query }} = {{ result }}</div>
    </div>
    {% endif %}

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% for r in results %}
    <div class="search-result">
        <div class="result-url">{{ r.url }}</div>
        <a href="{{ r.url }}" target="_blank" rel="noopener noreferrer" class="result-title">{{ r.title }}</a>
        <div class="result-desc">{{ r.desc }}</div>
    </div>
    {% endfor %}

    <div class="crawler-box">
        <div class="crawler-title">Otonom Tarayıcı Besleyici</div>
        <form method="GET" action="/">
            <input type="text" name="q" class="crawler-input" placeholder="İndekslenecek link URL">
            <button type="submit" class="crawler-btn">Veri İşle</button>
        </form>
    </div>
</div>
</body>
</html>
